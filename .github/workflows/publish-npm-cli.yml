name: Publish npm CLI

on:
  push:
    tags:
      - 'cli-v*'

jobs:
  publish-agent-spreadsheet:
    name: Publish agent-spreadsheet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm package version from tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "npm package version already matches tag: $VERSION"
          else
            npm version "$VERSION" --no-git-tag-version
          fi
        working-directory: npm/agent-spreadsheet

      - name: Determine npm dist-tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#cli-v}"
          DIST_TAG="latest"
          if [[ "$VERSION" == *"-alpha."* ]]; then
            DIST_TAG="alpha"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            DIST_TAG="beta"
          elif [[ "$VERSION" == *"-rc."* ]]; then
            DIST_TAG="rc"
          fi
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
          echo "Using npm dist-tag: $DIST_TAG"

      - name: Wait for GitHub release assets
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#cli-v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          ATTEMPTS=20
          DELAY=10
          ASSETS=(
            "agent-spreadsheet-linux-x86_64"
            "agent-spreadsheet-macos-x86_64"
            "agent-spreadsheet-macos-aarch64"
            "agent-spreadsheet-windows-x86_64.exe"
          )

          wait_for_asset() {
            local asset="$1"
            local url="${BASE_URL}/${asset}"

            for ((attempt=1; attempt<=ATTEMPTS; attempt++)); do
              if curl --silent --show-error --fail --location --head "$url" >/dev/null; then
                echo "Release asset is available: ${asset}"
                return 0
              fi
              echo "Waiting for release asset ${asset} (${attempt}/${ATTEMPTS})"
              sleep "$DELAY"
            done

            echo "Timed out waiting for release asset: ${asset}"
            return 1
          }

          for asset in "${ASSETS[@]}"; do
            wait_for_asset "$asset"
          done

      - name: Validate npm package contents
        run: npm pack --dry-run
        working-directory: npm/agent-spreadsheet

      - name: Publish npm package
        run: npm publish --access public --tag "$DIST_TAG"
        working-directory: npm/agent-spreadsheet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
