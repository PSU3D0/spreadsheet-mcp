name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            binary_extension: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
            binary_extension: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64
            binary_extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            binary_extension: .exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p spreadsheet-mcp -p spreadsheet-kit

      - name: Upload spreadsheet-mcp artifact
        uses: actions/upload-artifact@v4
        with:
          name: spreadsheet-mcp-${{ matrix.asset_suffix }}${{ matrix.binary_extension }}
          path: target/${{ matrix.target }}/release/spreadsheet-mcp${{ matrix.binary_extension }}
          if-no-files-found: error

      - name: Upload agent-spreadsheet artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-spreadsheet-${{ matrix.asset_suffix }}${{ matrix.binary_extension }}
          path: target/${{ matrix.target }}/release/agent-spreadsheet${{ matrix.binary_extension }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [[ "$name" == *.exe ]]; then
              cp "$dir"/* "release/$name"
            else
              cp "$dir"/* "release/$name"
              chmod +x "release/$name"
            fi
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish to crates.io
        run: |
          set -euo pipefail

          crate_version() {
            local manifest="$1"
            awk -F '"' '/^version = "[^"]+"/ { print $2; exit }' "$manifest"
          }

          wait_for_crate() {
            local crate="$1"
            local version="$2"
            local attempts=20
            local delay=15

            for ((attempt=1; attempt<=attempts; attempt++)); do
              if curl --silent --show-error --fail "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
                echo "${crate}@${version} is available on crates.io"
                return 0
              fi
              echo "Waiting for ${crate}@${version} to become available (${attempt}/${attempts})"
              sleep "$delay"
            done

            echo "Timed out waiting for ${crate}@${version} on crates.io"
            return 1
          }

          publish_and_wait() {
            local manifest="$1"
            local crate="$2"
            local version
            version="$(crate_version "$manifest")"

            cargo publish --locked --manifest-path "$manifest"
            wait_for_crate "$crate" "$version"
          }

          publish_and_wait crates/spreadsheet-kit/Cargo.toml spreadsheet-kit
          publish_and_wait crates/spreadsheet-mcp/Cargo.toml spreadsheet-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

